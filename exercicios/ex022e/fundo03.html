<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundo 3</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        .retangulo{
            width: 1268px;
            height: 400px;
            border: 1px solid black;
        }

        #r1{
            background: url(imagens/wallpaper003.jpg) left top;
        }

        #r2{
            background: url(imagens/wallpaper003.jpg) right bottom;
        }

        #r3{
            background: url(imagens/wallpaper003.jpg) center top;
        }

        #r4{
            background: url(imagens/wallpaper003.jpg) center center;
        }

    </style>
</head>
<body>
    <h1>Posição de um background</h1>

    <h2>background-position: left top;</h2>
    <div class="retangulo" id="r1"></div>

    <h2>background-position: right bottom;</h2>
    <div class="retangulo" id="r2"></div>

    <h2>background-position: center top;</h2>
    <div class="retangulo" id="r3"></div>

    <h2>background-position: center center;</h2>
    <div class="retangulo" id="r4"></div>

</body>
</html>
