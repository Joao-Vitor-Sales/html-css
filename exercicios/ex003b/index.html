<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com imagens</title>
</head>
<body>
    <h1>Testando carga de imagens</h1>
    <p>Abaixo você vai ver uma imagem que está  na mesma pasta</p>
    <img src="imagens/logo-html-250.png" alt="Logo HTML5">
    <p>Podmeos também carregar imagens que estão em subpastas</p>
    <img src="imagens/logo-css-250.png" alt="Logo CSS3">
    <p>Também podemos carregar imagens externas</p>
    <img src="https://cdn.iconscout.com/icon/free/png-256/javascript-2038874-1720087.png" alt="Logo Java Script">
    <!-- Lembrando que se por acaso o servidor do site que estiver hospedando a imagem que você está utilizando pela URL cair, sua imagem também não vai conseguir ser mais acessa e consequentemente não vai mais aparecer em seu site. Isso é um dos perigos de utilizar imagens através de uma URL -->
</body>
</html>
