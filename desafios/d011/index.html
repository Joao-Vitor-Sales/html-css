<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <title>Espaço</title>
    <style>
        body{
            margin: 0px;
        }
        
        #space{
            height: 100vh;
            width: 100%;

            background: black url('imagens/espaco.jpg') center center;
            background-size: cover;

            position: relative;
        }

        #astronaut{
            height: 400px;
            width: 400px;

            background: url('imagens/astronauta.png') center center;
            background-size: cover;

            position: absolute;
            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="space">
        <div id="astronaut">

        </div>
    </div>
</body>
</html>
